name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            ext: ""
          - target: x86_64-apple-darwin
            runner: macos-13
            ext: ""
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: ""
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: ""
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} -p pulsos-cli

      - name: Stage binary (unix)
        if: matrix.ext == ''
        run: |
          cp target/${{ matrix.target }}/release/pulsos \
             pulsos-${{ matrix.target }}
          shasum -a 256 pulsos-${{ matrix.target }} \
             > pulsos-${{ matrix.target }}.sha256

      - name: Stage binary (windows)
        if: matrix.ext == '.exe'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/pulsos.exe" `
                    "pulsos-${{ matrix.target }}.exe"
          $hash = (Get-FileHash "pulsos-${{ matrix.target }}.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  pulsos-${{ matrix.target }}.exe" | Out-File -Encoding ascii "pulsos-${{ matrix.target }}.exe.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulsos-${{ matrix.target }}
          path: |
            pulsos-${{ matrix.target }}${{ matrix.ext }}
            pulsos-${{ matrix.target }}${{ matrix.ext }}.sha256

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: cat artifacts/*.sha256 > artifacts/SHA256SUMS.txt

      - name: Render Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TEMPLATE="release/homebrew/pulsos.rb"
          OUT="artifacts/pulsos.rb"

          SHA_AARCH64_APPLE_DARWIN="$(grep "pulsos-aarch64-apple-darwin " artifacts/SHA256SUMS.txt | awk '{print $1}')"
          SHA_X86_64_APPLE_DARWIN="$(grep "pulsos-x86_64-apple-darwin " artifacts/SHA256SUMS.txt | awk '{print $1}')"
          SHA_AARCH64_UNKNOWN_LINUX_GNU="$(grep "pulsos-aarch64-unknown-linux-gnu " artifacts/SHA256SUMS.txt | awk '{print $1}')"
          SHA_X86_64_UNKNOWN_LINUX_GNU="$(grep "pulsos-x86_64-unknown-linux-gnu " artifacts/SHA256SUMS.txt | awk '{print $1}')"

          if [ -z "$SHA_AARCH64_APPLE_DARWIN" ] || [ -z "$SHA_X86_64_APPLE_DARWIN" ] || [ -z "$SHA_AARCH64_UNKNOWN_LINUX_GNU" ] || [ -z "$SHA_X86_64_UNKNOWN_LINUX_GNU" ]; then
            echo "Missing checksum(s) for Homebrew formula"
            exit 1
          fi

          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{SHA256_AARCH64_APPLE_DARWIN}}/${SHA_AARCH64_APPLE_DARWIN}/g" \
            -e "s/{{SHA256_X86_64_APPLE_DARWIN}}/${SHA_X86_64_APPLE_DARWIN}/g" \
            -e "s/{{SHA256_AARCH64_UNKNOWN_LINUX_GNU}}/${SHA_AARCH64_UNKNOWN_LINUX_GNU}/g" \
            -e "s/{{SHA256_X86_64_UNKNOWN_LINUX_GNU}}/${SHA_X86_64_UNKNOWN_LINUX_GNU}/g" \
            "$TEMPLATE" > "$OUT"

          if grep -n "{{" "$OUT"; then
            echo "Unsubstituted placeholders remain in Homebrew formula"
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/pulsos-*
            artifacts/SHA256SUMS.txt
            artifacts/pulsos.rb

  publish-crate:
    name: Publish to crates.io
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish pulsos-core
        run: cargo publish -p pulsos-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish pulsos-cli
        run: cargo publish -p pulsos-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
